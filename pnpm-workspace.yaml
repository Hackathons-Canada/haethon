packages:
  - 'components/*'
  - 'apps/*'      # Add this if you have an apps folder
  - 'packages/*'  # Add this if you have a packages folder

overrides:
  effect: 3.22.0
  postcss: 8.5.19

allowBuilds:
  '@clerk/shared': true
  '@sentry/cli': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  sharp: true
  unrs-resolver: true

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
